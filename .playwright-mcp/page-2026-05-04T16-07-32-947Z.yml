      - generic [ref=e1447]:
        - heading "Problem" [level=2] [ref=e1448]
        - paragraph [ref=e1449]: Keyword search treats a resume as a bag of strings. Recruiters end up sorting through false positives and missing strong candidates whose vocabulary doesn't match the JD.
        - heading "Approach" [level=2] [ref=e1450]
        - list [ref=e1451]:
          - listitem [ref=e1452]: React + TypeScript front-end with reusable Shadcn primitives.
          - listitem [ref=e1453]: GraphQL via Apollo for typed end-to-end contracts.
          - listitem [ref=e1454]: MongoDB Atlas vector index over candidate embeddings; structured filters layered on top for explainable ranking.
          - listitem [ref=e1455]: Stripe Checkout + webhooks for the paid tier.
        - heading "Outcome" [level=2] [ref=e1456]
        - paragraph [ref=e1457]: Live beta. Semantic match scoring across thousands of profiles, paid conversion working, and a UX recruiters actually trust.
